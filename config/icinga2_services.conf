/**
 * check_truenas_extended_play - Service templates and apply rules
 *
 * API KEY — set once per host, never per service:
 *
 *   Icinga 2 resolves command macros like $truenas_apikey$ by checking
 *   service.vars first, then host.vars. So setting vars.truenas_apikey
 *   on the host object is sufficient — all TrueNAS services inherit it
 *   automatically with no repetition.
 *
 * Required host vars:
 *   vars.truenas_apikey       = "4-xxxxxxxxx"  // API key — set ONCE here
 *
 * Optional host vars (override template defaults per host):
 *   vars.truenas_no_verify_cert = true  // skip SSL cert verification (self-signed)
 *   vars.truenas_zpool_warn   = 80      // default: 80%
 *   vars.truenas_zpool_crit   = 90      // default: 90%
 *   vars.truenas_cpu_warn     = 80      // default: 80%
 *   vars.truenas_cpu_crit     = 95      // default: 95%
 *   vars.truenas_mem_warn     = 80      // default: 80%
 *   vars.truenas_mem_crit     = 95      // default: 95%
 *   vars.truenas_net_warn     = 0       // Kbit/s, 0 = disabled
 *   vars.truenas_net_crit     = 0       // Kbit/s, 0 = disabled
 *
 * Minimal host definition (all 10 checks activate automatically):
 *
 *   object Host "nas01" {
 *     import "generic-host"
 *     address = "nas.example.com"
 *     vars.truenas_apikey         = "4-xxxxxxx"
 *     vars.truenas_no_verify_cert = true
 *   }
 */

// ---------------------------------------------------------------------------
// Base template — shared defaults for all TrueNAS service checks
// ---------------------------------------------------------------------------

template Service "check_truenas_generic" {
  check_command = "check_truenas"

  // truenas_apikey is NOT set here — it is inherited from host.vars automatically
  vars.truenas_hostname       = "$host.address$"
  vars.truenas_perfdata       = true
  vars.truenas_zpool_warn     = 80
  vars.truenas_zpool_crit     = 90
  vars.truenas_cpu_warn       = 80
  vars.truenas_cpu_crit       = 95
  vars.truenas_mem_warn       = 80
  vars.truenas_mem_crit       = 95
}

// ---------------------------------------------------------------------------
// Apply rules — all 10 checks activate on any host with vars.truenas_apikey
// ---------------------------------------------------------------------------

apply Service "TrueNAS Alerts" {
  import "check_truenas_generic"
  vars.truenas_type = "alerts"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS Apps" {
  import "check_truenas_generic"
  vars.truenas_type = "apps"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS ZPool Health" {
  import "check_truenas_generic"
  vars.truenas_type = "zpool"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS ZPool Capacity" {
  import "check_truenas_generic"
  vars.truenas_type       = "zpool_capacity"
  vars.truenas_zpool_warn = "$host.vars.truenas_zpool_warn$"
  vars.truenas_zpool_crit = "$host.vars.truenas_zpool_crit$"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS Datasets" {
  import "check_truenas_generic"
  vars.truenas_type       = "datasets"
  vars.truenas_zpool_warn = "$host.vars.truenas_zpool_warn$"
  vars.truenas_zpool_crit = "$host.vars.truenas_zpool_crit$"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS Replication" {
  import "check_truenas_generic"
  vars.truenas_type = "repl"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS Update" {
  import "check_truenas_generic"
  vars.truenas_type = "update"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS CPU" {
  import "check_truenas_generic"
  vars.truenas_type     = "sys_cpu"
  vars.truenas_cpu_warn = "$host.vars.truenas_cpu_warn$"
  vars.truenas_cpu_crit = "$host.vars.truenas_cpu_crit$"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS Memory" {
  import "check_truenas_generic"
  vars.truenas_type         = "sys_memory"
  vars.truenas_mem_warn     = "$host.vars.truenas_mem_warn$"
  vars.truenas_mem_crit     = "$host.vars.truenas_mem_crit$"

  assign where host.vars.truenas_apikey
}

apply Service "TrueNAS Network" {
  import "check_truenas_generic"
  vars.truenas_type     = "sys_network"
  vars.truenas_net_warn = "$host.vars.truenas_net_warn$"
  vars.truenas_net_crit = "$host.vars.truenas_net_crit$"

  assign where host.vars.truenas_apikey
}

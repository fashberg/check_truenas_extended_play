/**
 * check_truenas_extended_play - CheckCommand definition
 *
 * Place check_truenas_extended_play.py in PluginDir
 * (e.g. /usr/lib/nagios/plugins/) and make it executable.
 */

object CheckCommand "check_truenas" {
  command = [ PluginDir + "/check_truenas_extended_play.py" ]

  arguments = {
    "-H" = {
      value       = "$truenas_hostname$"
      required    = true
      description = "TrueNAS hostname or IP address"
    }
    "-p" = {
      value       = "$truenas_apikey$"
      required    = true
      description = "API key (or password when -u is set)"
    }
    "-t" = {
      value       = "$truenas_type$"
      required    = true
      description = "Check type: alerts, apps, datasets, zpool, zpool_capacity, repl, update, sys_cpu, sys_memory, sys_network"
    }
    "-u" = {
      value       = "$truenas_user$"
      set_if      = "$truenas_user$"
      description = "Username for password-based login (optional)"
    }
    "-pn" = {
      value       = "$truenas_zpoolname$"
      set_if      = "$truenas_zpoolname$"
      description = "ZPool name filter (default: all)"
    }
    "-nv" = {
      set_if      = "$truenas_no_verify_cert$"
      description = "Skip SSL certificate verification"
    }
    "-ns" = {
      set_if      = "$truenas_no_ssl$"
      description = "Disable SSL (use ws:// instead of wss://)"
    }
    "-ig" = {
      set_if      = "$truenas_ignore_dismissed$"
      description = "Ignore already-dismissed alerts"
    }
    "-zp" = {
      set_if      = "$truenas_perfdata$"
      description = "Emit perfdata (capacity, cpu, memory, network)"
    }
    "-zw" = {
      value       = "$truenas_zpool_warn$"
      set_if      = "$truenas_zpool_warn$"
      description = "ZPool/dataset warning threshold % (default: 80)"
    }
    "-zc" = {
      value       = "$truenas_zpool_crit$"
      set_if      = "$truenas_zpool_crit$"
      description = "ZPool/dataset critical threshold % (default: 90)"
    }
    "-cw" = {
      value       = "$truenas_cpu_warn$"
      set_if      = "$truenas_cpu_warn$"
      description = "CPU warning threshold % avg/1h (default: 80)"
    }
    "-cc" = {
      value       = "$truenas_cpu_crit$"
      set_if      = "$truenas_cpu_crit$"
      description = "CPU critical threshold % avg/1h (default: 95)"
    }
    "-mw" = {
      value       = "$truenas_mem_warn$"
      set_if      = "$truenas_mem_warn$"
      description = "Memory warning threshold % (default: 80)"
    }
    "-mc" = {
      value       = "$truenas_mem_crit$"
      set_if      = "$truenas_mem_crit$"
      description = "Memory critical threshold % (default: 95)"
    }
    "-nw" = {
      value       = "$truenas_net_warn$"
      set_if      = "$truenas_net_warn$"
      description = "Network warning threshold Kbit/s (0 = disabled)"
    }
    "-nc" = {
      value       = "$truenas_net_crit$"
      set_if      = "$truenas_net_crit$"
      description = "Network critical threshold Kbit/s (0 = disabled)"
    }
    "-d" = {
      set_if      = "$truenas_debug$"
      description = "Enable debug output"
    }
  }
}
